
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Porsche Sales Intelligence</title>

<!-- ✅ SCRIPT CORRETO -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background:#0a0a0a;
    color:white;
}

/* HEADER */
.hero {
    height:300px;
    background:
    linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.9)),
    url('porsche-hero.jpg') center/cover;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:40px;
}

.hero h1 { font-size:42px; margin:0; }
.hero p { color:#bbb; }

/* CONTAINER */
.container { padding:25px }

/* FILTROS */
.filters {
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.filter-group {
    display:flex;
    flex-direction:column;
}

select {
    padding:12px;
    font-size:14px;
    background:#141414;
    border:1px solid #333;
    border-radius:8px;
    color:white;
}

/* KPIs */
.kpis {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}


.card {
    background:#141414;
    padding:18px;
    border-radius:12px;
    transition: all 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(213,0,28,0.3);
}

/* anima entrada */
.chart-box {
    animation: fadeUp 0.6s ease;
}

@keyframes fadeUp {
    from {
        opacity:0;
        transform: translateY(20px);
    }
    to {
        opacity:1;
        transform: translateY(0);
    }
}


.card {
    background:#141414;
    padding:18px;
    border-radius:12px;
}

.card h2 { color:#D5001C; }

/* GRID */
.grid {
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    margin-top:20px;
}

.chart-box {
    background:#141414;
    padding:15px;
    border-radius:12px;
}

/* INSIGHT */
.insight {
    margin-top:20px;
    background:#141414;
    padding:20px;
    border-radius:12px;
}


/* INSIGHT */
.insight {
    margin-top:20px;
    background:#141414;
    padding:20px;
    border-radius:12px;
}

/* 🔥 NOVO CÓDIGO AQUI EMBAIXO */

button:hover {
    transform: scale(1.05);
    background:#FF1744;
    transition:0.2s;
}

#answer {
    animation: fadeAI 0.4s ease;
}

@keyframes fadeAI {
    from { opacity:0; transform: translateY(10px); }
    to { opacity:1; transform: translateY(0); }
}


/* efeito typing */
#answer {
    margin-top:15px;
    line-height:1.6;
    color:#ccc;
    animation: fadeAI 0.4s ease;
}

@keyframes fadeAI {
    from { opacity:0; transform: translateY(10px); }
    to { opacity:1; transform: translateY(0); }
}

/* botão animado */
button:hover {
    background:#FF1744;
    transform: scale(1.05);
    transition:0.2s;
}


</style>
</head>

<body>

<div class="hero">
<h1>Porsche Sales Intelligence</h1>
<p>Análise executiva de vendas</p>
</div>

<div class="container">

<div class="filters">
<div class="filter-group">
<span>Ano</span>
<select id="year"></select>
</div>

<div class="filter-group">
<span>Estado</span>
<select id="state"></select>
</div>

<div class="filter-group">
<span>Modelo</span>
<select id="model"></select>
</div>

<div class="filter-group">
<span>Pagamento</span>
<select id="payment"></select>
</div>
</div>

<div class="kpis">
<div class="card"><h3>Receita</h3><h2 id="rev"></h2></div>
<div class="card"><h3>Ticket Médio</h3><h2 id="avg"></h2></div>
<div class="card"><h3>Vendas</h3><h2 id="count"></h2></div>
<div class="card"><h3>Maior Venda</h3><h2 id="max"></h2></div>
</div>

<div class="grid">
<div class="chart-box"><canvas id="cYear"></canvas></div>
<div class="chart-box"><canvas id="cModel"></canvas></div>
</div>

<div class="grid">
<div class="chart-box"><canvas id="cState"></canvas></div>
<div class="chart-box"><canvas id="cPay"></canvas></div>
</div>

<div class="insight" id="insight"></div>


<div class="insight">
<h3>Assistente de Negócio</h3>

<input 
    id="question" 
    placeholder="Ex: qual modelo gera mais receita?" 
    style="width:100%; padding:12px; margin-top:10px; background:#111; border:none; color:white; border-radius:8px"
>

<button onclick="ask()" 
    style="margin-top:10px; padding:10px 15px; background:#D5001C; border:none; color:white; border-radius:8px; cursor:pointer">
Perguntar
</button>

<div id="answer" style="margin-top:15px; color:#ccc; line-height:1.5"></div>
</div>


</div>

<script>

fetch('/porsche-data.json')
.then(r=>r.json())
.then(data=>init(data));

function init(data){

function fill(id, arr){
let el=document.getElementById(id);
el.innerHTML='<option value="all">Todos</option>';
[...new Set(arr)].forEach(v=>el.innerHTML+=`<option>${v}</option>`);
}

fill('year',data.map(d=>d.ano));
fill('state',data.map(d=>d.estado));
fill('model',data.map(d=>d.modelo));
fill('payment',data.map(d=>d.pagamento));


function f(){

let yearValue = document.getElementById("year").value;
let stateValue = document.getElementById("state").value;
let modelValue = document.getElementById("model").value;
let paymentValue = document.getElementById("payment").value;

return data.filter(d =>
(yearValue === 'all' || d.ano == yearValue) &&
(stateValue === 'all' || d.estado == stateValue) &&
(modelValue === 'all' || d.modelo == modelValue) &&
(paymentValue === 'all' || d.pagamento == paymentValue)
);

}


function group(d,key){
let r={};
d.forEach(x=>r[x[key]]=(r[x[key]]||0)+x.valor);
return r;
}

function kpi(d){
let sum=d.reduce((a,b)=>a+b.valor,0);
rev.innerText='R$ '+sum.toLocaleString();
avg.innerText='R$ '+Math.round(sum/d.length||0).toLocaleString();
count.innerText=d.length;
max.innerText='R$ '+Math.max(...d.map(x=>x.valor),0).toLocaleString();
}

let yChart=new Chart(cYear,{type:'line',data:{labels:[],datasets:[{data:[],borderColor:'#D5001C'}]}});


let mChart=new Chart(cModel,{
type:'bar',
data:{labels:[],datasets:[{
    data:[],
    backgroundColor: (context)=>{
        return context.dataIndex === 0 ? "#FF1744" : "#D5001C";
    }
}]},
options:{
    plugins:{
        legend:{display:false},
        tooltip:{
            callbacks:{
                label:(ctx)=>"R$ " + ctx.raw.toLocaleString()
            }
        }
    }
}
});


mChart.data.labels = [];
mChart.data.datasets[0].data = [];



let sChart=new Chart(cState,{type:'bar',data:{labels:[],datasets:[{data:[],backgroundColor:'#999'}]}});

let pChart=new Chart(cPay,{type:'doughnut',
data:{labels:[],datasets:[{data:[],backgroundColor:["#D5001C","#FF1744","#FF5252","#FF8A80","#444"]}]}});


function update(){

let d = f();

console.log("FILTRO RESULT:", d);


kpi(d);


let m = group(d,"modelo");
let s = group(d,"estado");
let y = group(d,"ano");
let p = group(d,"pagamento");


document.querySelectorAll("select")
.forEach(s=>s.addEventListener("change",update));





window.ask = async function(){

let q = document.getElementById("question").value;

const box = document.getElementById("answer");

/* loading UX */
box.innerHTML = "🤖 Pensando...";

/* chamada IA real */
const response = await fetch("http://localhost:3000/ask", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ question: q })
});

const data = await response.json();

/* resposta IA */
box.innerHTML = data;

}




}


function generateAIResponse(q, ctx){

/* ================= RECEITA ================= */
if(q.includes("receita") || q.includes("faturamento")){
return `
💰 Receita total: <b>R$ ${ctx.total.toLocaleString()}</b><br>
📈 Crescimento: <b>${ctx.growth.toFixed(1)}%</b><br>
👉 Interpretação: ${ctx.growth > 10 ? "crescimento consistente" : "crescimento moderado ou instável"}<br>
🧠 Ação recomendada: reforçar canais que sustentam esse crescimento
`;
}

/* ================= MODELO ================= */
if(q.includes("modelo") || q.includes("produto")){
let second = ctx.modelsSorted[1];

return `
🔥 Modelo líder: <b>${ctx.topModel[0]}</b><br>
💰 Receita: R$ ${ctx.topModel[1].toLocaleString()}<br>
📊 Segundo lugar: ${second?.[0] || "-"}<br>

👉 Insight:
Alta concentração no topo → risco de dependência

🧠 Ação:
Diversificar portfólio ou ampliar oferta do segundo colocado
`;
}

/* ================= ESTADO ================= */
if(q.includes("estado") || q.includes("região")){
return `
🌎 Estado líder: <b>${ctx.topState[0]}</b><br>

👉 Insight:
Concentração geográfica relevante

🧠 Ação:
Expandir presença em novos mercados com perfil semelhante
`;
}

/* ================= TENDÊNCIA ================= */
if(q.includes("tendencia") || q.includes("crescimento")){
return `
📈 Crescimento total: <b>${ctx.growth.toFixed(1)}%</b><br>

👉 Insight:
${ctx.growth > 20 ? "expansão acelerada" : "crescimento estável"}

🧠 Ação:
${ctx.growth > 20 ? "escala operação e estoque" : "monitorar consistência"}
`;
}

/* ================= PREMIUM ================= */
if(q.includes("premium") || q.includes("alto valor")){
let perc = Math.round(ctx.premiumCount / ctx.totalCount * 100);

return `
💎 Vendas premium: <b>${perc}%</b><br>

👉 Insight:
Cliente de alto valor dominante

🧠 Ação:
Focar estratégia em produtos premium e experiência
`;
}

/* ================= PAGAMENTO ================= */
if(q.includes("pagamento")){
let paySorted = Object.entries(ctx.byPay).sort((a,b)=>b[1]-a[1]);

return `
💳 Método líder: <b>${paySorted[0][0]}</b>

👉 Insight:
Preferência clara por esse método

🧠 Ação:
Otimizar oferta e incentivo nesse canal
`;
}

/* ================= RECOMENDAÇÃO EXECUTIVA ================= */
if(q.includes("o que fazer") || q.includes("recomenda")){
return `
🧠 Recomendações estratégicas:

• Foco em <b>${ctx.topModel[0]}</b> (motor de receita)
• Expandir em <b>${ctx.topState[0]}</b>
• Explorar mercado premium
• Reduzir dependência de top produto

📊 Justificativa:
Base concentrada + ticket alto
`;
}

/* ================= FALLBACK INTELIGENTE ================= */
return `
🤖 Análise geral baseada nos dados atuais:

🔥 Produto líder: ${ctx.topModel[0]}<br>
🌎 Estado dominante: ${ctx.topState[0]}<br>
📈 Crescimento: ${ctx.growth.toFixed(1)}%<br>

👉 Interpretação:
Negócio com forte concentração e posicionamento premium

🧠 Recomendação:
Expandir mantendo foco em alta margem
`;
}



function generateAI(q, data){

/* RECEITA */
if(q.includes("receita") || q.includes("faturamento")){
return `
💰 Receita total: R$ ${data.total.toLocaleString()}<br>
📊 Crescimento: ${data.growth.toFixed(1)}%<br>
👉 Insight: tendência ${data.growth > 0 ? "de crescimento" : "de queda"}
`;
}

/* MODELO */
if(q.includes("modelo") || q.includes("produto")){
return `
🔥 Modelo líder: ${data.topModel[0]}<br>
💰 Receita: R$ ${data.topModel[1].toLocaleString()}<br>
👉 Insight: forte dependência desse modelo
`;
}

/* ESTADO */
if(q.includes("estado") || q.includes("região")){
return `
🌎 Estado líder: ${data.topState[0]}<br>
👉 Insight: concentração geográfica relevante
`;
}

/* TENDÊNCIA */
if(q.includes("tendencia") || q.includes("crescimento")){
return `
📈 Variação total: ${data.growth.toFixed(1)}%<br>
👉 Insight: ${data.growth > 20 ? "crescimento acelerado" : "estável"}
`;
}

/* PREMIUM */
if(q.includes("premium") || q.includes("alto valor")){
let premium = data.rows.filter(x=>x.valor > data.avg).length;

return `
💎 Vendas premium: ${premium} (${Math.round(premium/data.rows.length*100)}%)<br>
👉 Insight: estratégia focada em alto valor
`;
}

/* RECOMENDAÇÃO */
if(q.includes("o que fazer") || q.includes("recomendacao")){
return `
🧠 Recomendações estratégicas:<br>
• Focar em ${data.topModel[0]}<br>
• Expandir em ${data.topState[0]}<br>
• Explorar crescimento premium
`;
}

/* FALLBACK INTELIGENTE */
return `
🤖 Não encontrei exatamente sua pergunta, mas aqui vai um insight:<br><br>

🔥 ${data.topModel[0]} domina receita<br>
🌎 ${data.topState[0]} lidera mercado<br>
📈 Crescimento de ${data.growth.toFixed(1)}%
`;
}



let d=f();
kpi(d);

/* YEAR */
let y=group(d,"ano");
yChart.data.labels=Object.keys(y);
yChart.data.datasets[0].data=Object.values(y);

/* MODEL */
let m=group(d,"modelo");
let ordered=Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,8);
mChart.data.labels=ordered.map(x=>x[0]);
mChart.data.datasets[0].data=ordered.map(x=>x[1]);

/* STATE */
let s=group(d,"estado");
sChart.data.labels=Object.keys(s);
sChart.data.datasets[0].data=Object.values(s);

/* PAYMENT */
let p=group(d,"pagamento");
pChart.data.labels=Object.keys(p);
pChart.data.datasets[0].data=Object.values(p);


/* ✅***SIGHT CORRIGIDO COMPLETO */
let total = d.reduce((a,b)=>a+b.valor,0);

let topModel = ordered.length ? ordered[0] : ["-", 0];


let stateEntries = Object.entries(s);
let topState = stateEntries.length ? stateEntries.sort((a,b)=>b[1]-a[1])[0] : ["-",0];



insight.innerHTML = `
<h3>Insights estratégicos</h3>

🔥 Modelo líder: ${topModel[0]} (${Math.round(topModel[1]/(total||1)*100)}%)

<br>

🌎 Estado líder: ${topState[0]}

<br>

💰 Ticket médio: R$ ${Math.round(total/(d.length||1)).toLocaleString()}
`;



document.querySelectorAll("select").forEach(s=>s.addEventListener("change",update));

update();

}
</script>

</body>
</html>
